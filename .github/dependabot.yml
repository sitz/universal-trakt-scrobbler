version: 2
updates:
  # npm/pnpm dependencies (reads pnpm-lock.yaml)
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Collapse routine minor/patch bumps into a single PR to cut review noise.
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # Keep GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
